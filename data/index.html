<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ESP PID LDR</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main>
    <section>
      <h1>Controlador PID</h1>
      <div class="grid">
        <div class="metric">Luz<b><span id="input">0.0</span>%</b></div>
        <div class="metric">Setpoint<b><span id="setpointValue">0.0</span>%</b></div>
        <div class="metric">Error<b><span id="error">0.0</span></b></div>
        <div class="metric">Salida PWM<b><span id="output">0.0</span>%</b></div>
        <div class="metric">Estado<b id="state" class="status">NO SET</b></div>
        <div class="metric">ADC raw<b><span id="raw">0</span></b></div>
        <div class="metric">Luz sin filtro<b><span id="rawPercent">0.0</span>%</b></div>
      </div>
    </section>

    <section>
      <form id="configForm" method="post" action="/config">
        <div class="row">
          <div>
            <label for="setpoint">Setpoint luz (%)</label>
            <input id="setpoint" name="setpoint" type="number" min="0" max="100" step="0.1">

            <label for="kp">Kp</label>
            <input id="kp" name="kp" type="number" step="0.01">

            <label for="ki">Ki</label>
            <input id="ki" name="ki" type="number" step="0.01">

            <label for="kd">Kd</label>
            <input id="kd" name="kd" type="number" step="0.01">
          </div>

          <div>
            <label for="outMin">PWM minimo</label>
            <input id="outMin" name="outMin" type="number" min="0" max="1023" step="1">

            <label for="outMax">PWM maximo</label>
            <input id="outMax" name="outMax" type="number" min="0" max="1023" step="1">

            <label class="check">
              <input id="invert" name="invert" type="checkbox">
              Invertir lectura del sensor
            </label>
          </div>
        </div>

        <p><button type="submit">Guardar parametros</button></p>
      </form>

      <form id="resetForm" method="post" action="/reset">
        <button type="submit">Reiniciar PID</button>
      </form>

      <p id="refreshState">Actualizacion automatica activa</p>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
